<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東証チャートの縦流し</title>
    <!-- パソコン内のファイル、またはRender上のライブラリを読み込む設定 -->
    <script src="lightweight-charts.js"></script>
    <style>
        body { margin: 0; padding: 10px; background-color: #131722; color: #d1d4dc; font-family: sans-serif; }
        
        /* ★ 上部固定のコントロールパネル */
        #control-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #1c2030;
            box-sizing: border-box;
            padding: 12px;
            border-bottom: 2px solid #2a2e39;
            z-index: 1000;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-section {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        /* 業種選択ボタンと開始ボタン */
        #toggle-sector-btn, #start-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        #toggle-sector-btn {
            background: #434651;
            color: #d1d4dc;
            border: 1px solid #5d6175;
        }

        #start-btn {
            background: #26a69a;
            color: white;
            flex-grow: 1; /* 残りの横幅いっぱいに広げる */
            text-align: center;
        }

        /* ★ アコーディオンで開閉する業種チェックボックスのエリア */
        #sector-container {
            background: #151927;
            border-radius: 4px;
            padding: 10px;
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            display: none; /* 初期状態は非表示 */
        }

        #sector-container.open {
            display: block; /* ボタンクリックで表示 */
        }

        .sector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            font-size: 12px;
        }

        /* チャートエリア（上部のパネルの高さ分、余白を開ける） */
        #app { margin-top: 90px; }

        .chart-container { margin-bottom: 25px; background: #1c2030; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .chart-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; padding-left: 5px; }
        .chart-area { width: 100%; height: 220px; }
        
        #loading { text-align: center; padding: 20px; color: #848e9c; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 🛠️ 上部固定操作バー（市場区分、業種選択ボタン、足種、開始ボタンのみ表示） -->
    <div id="control-panel">
        <div class="control-row">
            <!-- 市場区分 -->
            <div class="control-section">
                <span>市場:</span>
                <label><input type="checkbox" class="market" value="プライム">P</label>
                <label><input type="checkbox" class="market" value="スタンダード">S</label>
                <label><input type="checkbox" class="market" value="グロース">G</label>
            </div>

            <!-- 足種 -->
            <div class="control-section">
                <span>足:</span>
                <label><input type="radio" name="interval" value="1d" checked>日</label>
                <label><input type="radio" name="interval" value="1wk">週</label>
                <label><input type="radio" name="interval" value="1mo">月</label>
            </div>
        </div>

        <div class="control-row">
            <!-- 業種選択ボタン -->
            <button id="toggle-sector-btn" type="button">▼ 業種選択</button>
            <!-- 描画開始ボタン -->
            <button id="start-btn" type="button">描画開始</button>
        </div>

        <!-- ボタンクリックでパッと開閉する17業種の隠しエリア -->
        <div id="sector-container">
            <div class="sector-grid" id="sector-box">
                <label><input type="checkbox" id="sector-all"> 【全業種】</label>
                <!-- ここにPythonのAPIから取得した17業種が自動で並びます -->
            </div>
        </div>
    </div>

    <!-- チャート表示エリア -->
    <div id="app"></div>
    <div id="loading"></div>

    <script>
        let page = 1;
        let loading = false;
        let drawing = false;
        let currentInterval = "1d";
        let selectedMarkets = [];
        let selectedSectors = [];

        const appContainer = document.getElementById('app');
        const sectorContainer = document.getElementById('sector-container');
        const toggleSectorBtn = document.getElementById('toggle-sector-btn');
        const sectorBox = document.getElementById('sector-box');

        // 1. 最初期にPythonのAPIから17業種一覧を読み込んでセットする
        fetch("/api/sectors")
            .then(res => res.json())
            .then(json => {
                const sectors = json.sectors.filter(s => s !== "その他");
                sectors.push("undefined", "その他"); // 安全のため

                sectors.forEach(sec => {
                    if(!sec || sec === "undefined") return;
                    const label = document.createElement("label");
                    label.innerHTML = `<input type="checkbox" class="sector" value="${sec}"> ${sec}`;
                    sectorBox.appendChild(label);
                });
            });

        // 2. 「業種選択」ボタンを押したときの開閉処理
        toggleSectorBtn.addEventListener('click', () => {
            const isOpen = sectorContainer.classList.toggle('open');
            toggleSectorBtn.innerText = isOpen ? "▲ 業種を閉じる" : "▼ 業種選択";
        });

        // 全業種に一括チェックを入れる処理
        document.getElementById("sector-all").addEventListener("change", (e) => {
            const checked = e.target.checked;
            document.querySelectorAll(".sector").forEach(cb => cb.checked = checked);
            selectedSectors = checked ? [...document.querySelectorAll(".sector")].map(x => x.value) : [];
        });

        // 選択された条件のリアルタイム監視
        document.addEventListener("change", e => {
            if (e.target.classList.contains("market")) {
                selectedMarkets = [...document.querySelectorAll(".market:checked")].map(x => x.value);
            }
            if (e.target.classList.contains("sector")) {
                selectedSectors = [...document.querySelectorAll(".sector:checked")].map(x => x.value);
            }
            if (e.target.name === "interval") {
                currentInterval = e.target.value;
            }
        });

        // 3. 「描画開始」ボタンを押したときの動き
        document.getElementById('start-btn').addEventListener('click', () => {
            drawing = true;
            
            // ★ 業種選択エリアを自動で閉じる
            sectorContainer.classList.remove('open');
            toggleSectorBtn.innerText = "▼ 業種選択";

            // 画面をリセットして1ページ目から読み込む
            appContainer.innerHTML = "";
            document.getElementById("loading").innerText = "読み込み中...";
            page = 1;
            loadNextPage();
        });

        // 4. 動的に銘柄のリスト（20件ずつ）を取得してループで回す
        async function loadNextPage() {
            if (!drawing || loading) return;
            loading = true;

            const params = new URLSearchParams({
                page: page,
                markets: selectedMarkets.join(","),
                sectors: selectedSectors.join(",")
            });

            try {
                const response = await fetch(`/api/list?${params}`);
                const json = await response.json();

                if (!json.data || json.data.length === 0) {
                    document.getElementById("loading").innerText = "すべて読み込みました";
                    loading = false;
                    return;
                }

                // 20件の銘柄を順番にチャートカード化
                for (const stock of json.data) {
                    await createChartCard(stock.code, stock.name);
                }

                page++;
            } catch (e) {
                console.error("リスト取得エラー:", e);
            } finally {
                loading = false;
            }
        }

        // 5. チャートカードを1枚生成して描画する関数
        async function createChartCard(code, name) {
            const container = document.createElement('div');
            container.className = 'chart-container';
            
            const title = document.createElement('div');
            title.className = 'chart-title';
            title.innerText = `${code} ${name}`;
            container.appendChild(title);

            const chartArea = document.createElement('div');
            chartArea.className = 'chart-area';
            container.appendChild(chartArea);
            
            appContainer.appendChild(container);

            try {
                // 足種(interval)もPython側に伝えるように修正
                const response = await fetch(`/api/chart?ticker=${code}&interval=${currentInterval}`);
                const resData = await response.json();
                
                if (!response.ok) throw new Error(resData.error);

                const LightweightChartsLib = window.LightweightCharts || window.lightweightCharts;
                if (!LightweightChartsLib) throw new Error("ライブラリの起動に失敗しました");

                const chart = LightweightChartsLib.createChart(chartArea, {
                    layout: { backgroundColor: '#1c2030', textColor: '#d1d4dc' },
                    grid: { vertLines: { color: 'rgba(42, 46, 57, 0.5)' }, horzLines: { color: 'rgba(42, 46, 57, 0.5)' } },
                    rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
                    timeScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
                });

                const candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a', downColor: '#ef5350', borderDownColor: '#ef5350', borderUpColor: '#26a69a', wickDownColor: '#ef5350', wickUpColor: '#26a69a',
                });
                candlestickSeries.setData(resData.data);
                chart.timeScale().fitContent();

                window.addEventListener('resize', () => {
                    chart.resize(chartArea.clientWidth, 220);
                });

            } catch (error) {
                chartArea.innerText = `データがありません`;
                chartArea.style.color = '#ef5350';
                chartArea.style.padding = "20px";
            }
        }

        // 6. 無限スクロールの検知（一番下まで来たら次の20件を読む）
        window.addEventListener("scroll", () => {
            if (!drawing) return;
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
                loadNextPage();
            }
        });
    </script>
</body>
</html>
